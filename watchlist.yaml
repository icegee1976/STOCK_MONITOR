# ============================================================
#  台股 ETF / 基金
#  ETF 沒有本益比,故用兩種法:
#    market/主題型 → price_band(歷史股價分布百分位)
#    高股息型      → yield_band(殖利率河流圖:高殖利率=便宜)
# ============================================================

# ---------- 市值型 / 主題型(股價分布法) ----------

  - ticker: "0050"
    market: TW
    name: 元大台灣50
    theme: [ETF, 市值型, 大盤]
    valuation:
      method: price_band
      lookback_years: 5
    note: "國民 ETF,追蹤台灣50指數≈大盤。殖利率僅~1.3%,故用股價分布而非殖利率法;近高點易顯示昂貴。"

  - ticker: "006208"
    market: TW
    name: 富邦台50
    theme: [ETF, 市值型, 大盤]

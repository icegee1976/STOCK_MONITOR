# ============================================================
#  監測清單 (watchlist)  —  AI + 太空 成長股
# ============================================================
#  每一檔的「估價假設」都攤在這裡，請當成活文件持續修改。
#
#  ⚠ 最重要的觀念：「便宜價」不是 API 算出來的事實，而是建立在
#     你對「未來 EPS / 未來營收」的假設上。改一個成長率，便宜價
#     就會差很多。所以這些數字是「可辯論的判斷」，不是真理。
#     程式會用它們計算，但永遠對你誠實標示假設來源。
#
#  估價方法 (method) 三選一：
#    pe_band    : 適合「會賺錢」的成長股。
#                 forward_eps(或 derive) × pe_bands = 五個價格帶
#    ps_band    : 適合「還在燒錢、本益比無意義」的成長股(多數太空股)。
#                 (forward_revenue / shares) × ps_bands = 價格帶
#    price_band : 最保守的後備法。直接用過去 N 年「股價分布百分位」
#                 當價格帶，完全不靠 EPS 假設。
#
#  pe_bands / ps_bands 可填 'auto' → 用歷史本益比(河流圖)的百分位自動推。
# ============================================================

stocks:

# ---------- 台股：PDF《AI 護國群山》四大標的 ----------

  - ticker: "2330"
    market: TW
    name: 台積電 TSMC
    theme: [先進製程, CoWoS, CPO]
    valuation:
      method: pe_band
      derive:                 # forward EPS 推導鏈 (PDF p.4，保守值)
        base_revenue: 2.89e12 # 2024 營收 (TWD)
        revenue_cagr: 0.24    # 年複合成長率假設
        net_margin: 0.41362   # 稅後淨利率
        shares: 25.93e9       # 發行股數
        target_year: 2029
      pe_bands:               # PDF p.5 河流圖區間 (≈歷史 PE 百分位)
        super_bargain: 12.81
        cheap: 16.49
        fair: 23.85
        expensive: 27.53
        euphoria: 31.20
    note: "PDF p4-5。便宜價≈2226、大特價≈1729。市場標準制定者。"

  - ticker: "2317"
    market: TW
    name: 鴻海 Hon Hai
    theme: [CPO, AI伺服器, 工業富聯]
    valuation:
      method: pe_band
      forward_eps: 17.79      # PDF p.7：2026 預估 EPS
      target_year: 2026
      pe_bands:               # 便宜 PE 11.5 來自 PDF；其餘為估計，請校正
        super_bargain: 9.5
        cheap: 11.5
        fair: 15.0
        expensive: 18.5
        euphoria: 22.0
    note: "PDF p6-7。便宜價≈204.7 (17.79×11.5)。NVIDIA 唯一代工 + CPO 第二成長曲線。"

  - ticker: "2454"
    market: TW
    name: 聯發科 MediaTek
    theme: [ASIC, 客製化晶片]
    valuation:
      method: pe_band
      forward_eps: 132        # PDF p.9：2027 EPS(較保守)。2028 樂觀情境喊到 400
      target_year: 2027
      pe_bands: auto          # 用歷史本益比河流圖自動推
    note: "PDF p8-9。ASIC 十倍速成長。EPS 2026 短暫下降(63)→2028 三級跳。主人與小狗理論。"

  - ticker: "2449"
    market: TW
    name: 京元電子 KYEC
    theme: [高功率測試, AI測試]
    valuation:
      method: pe_band
      forward_eps: 18.0       # PDF p.10：明年 EPS
      target_year: 2027
      pe_bands: auto
    note: "PDF p10。物美價廉純 AI 股，本益比約 17x 遠低於大盤 30x。AI 測試營收年增近 100%。"

